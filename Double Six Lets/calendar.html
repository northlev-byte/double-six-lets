<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Six Lets — Calendar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f97316'/><text x='16' y='22' text-anchor='middle' font-family='serif' font-size='14' font-weight='700' fill='%23fff'>66</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f8fa;--surface:#fff;--surface2:#f1f1f5;--border:#e4e4ea;--accent:#f97316;--accent-dim:#ea670c;--accent-soft:rgba(249,115,22,.08);--accent-light:#fff7ed;--text:#1a1a2e;--text-muted:#6b7080;--text-dim:#a0a4b0;--green:#10b981;--red:#e11d48;--amber:#d97706;--blue:#3b82f6;--purple:#7c3aed;--teal:#0d9488;--shadow:0 2px 8px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(249,115,22,.25);}
.brand-name{font-family:'DM Serif Display',serif;font-size:18px;}
.brand-sub{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:7px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text-muted);transition:all .15s;text-decoration:none;}
.nav-link:hover{background:var(--surface2);color:var(--text);}
.nav-link.active{background:var(--accent-soft);color:var(--accent);}
.header-right{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(249,115,22,.25);}
.btn-primary:hover{background:var(--accent-dim);transform:translateY(-1px);box-shadow:0 4px 12px rgba(249,115,22,.3);}
.btn-ghost{background:var(--surface);color:var(--text-muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-muted);transition:all .15s;font-size:16px;}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

/* Page layout */
.page{max-width:1400px;margin:0 auto;padding:24px;display:flex;gap:24px;}
.calendar-main{flex:1;min-width:0;}
.sidebar-panel{width:340px;min-width:340px;}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.toolbar-left{display:flex;align-items:center;gap:12px;}
.toolbar-right{display:flex;align-items:center;gap:8px;}
.month-title{font-family:'DM Serif Display',serif;font-size:24px;min-width:220px;}
.nav-arrows{display:flex;gap:4px;}
.view-toggle{display:flex;gap:4px;}
.view-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.view-btn:hover{border-color:var(--accent);}
.view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.filter-chip:hover{border-color:var(--accent);}
.filter-chip.active{border-color:currentColor;font-weight:600;}
.filter-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.search-box{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;width:180px;transition:all .15s;}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,.08);}
.search-box::placeholder{color:var(--text-dim);}

/* Calendar grid */
.calendar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-header-cell{padding:10px 4px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border);background:var(--surface2);}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:100px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:background .12s;position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:rgba(249,115,22,.03);}
.cal-cell.other-month{background:var(--surface2);opacity:.5;}
.cal-cell.other-month:hover{opacity:.7;}
.cal-cell.today{background:rgba(249,115,22,.04);}
.cal-cell.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;}
.cal-cell.selected{box-shadow:inset 0 0 0 2px var(--accent);background:rgba(249,115,22,.03);}
.day-num{font-size:13px;font-weight:500;margin-bottom:4px;display:inline-block;}
.day-events{display:flex;flex-direction:column;gap:2px;}
.day-event{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;cursor:pointer;transition:opacity .12s;}
.day-event:hover{opacity:.8;}
.day-more{font-size:10px;color:var(--text-dim);padding:1px 4px;cursor:pointer;font-weight:500;}
.day-more:hover{color:var(--accent);}

/* Week view */
.week-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.week-header{display:grid;grid-template-columns:60px repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--surface2);}
.week-header-cell{padding:10px 6px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);}
.week-header-cell .week-day-num{display:block;font-size:18px;font-family:'DM Serif Display',serif;color:var(--text);margin-top:2px;letter-spacing:0;text-transform:none;}
.week-header-cell.today-col .week-day-num{background:var(--accent);color:#fff;border-radius:50%;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;}
.week-body{display:grid;grid-template-columns:60px repeat(7,1fr);max-height:600px;overflow-y:auto;}
.week-time{padding:4px 8px;font-size:10px;color:var(--text-dim);text-align:right;border-right:1px solid var(--border);height:48px;display:flex;align-items:flex-start;justify-content:flex-end;}
.week-slot{border-right:1px solid var(--border);border-bottom:1px solid rgba(228,228,234,.5);height:48px;position:relative;cursor:pointer;transition:background .1s;}
.week-slot:nth-child(8n){border-right:none;}
.week-slot:hover{background:rgba(249,115,22,.03);}
.week-event{position:absolute;left:2px;right:2px;padding:3px 6px;border-radius:4px;font-size:10px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;z-index:2;cursor:pointer;}

/* Event colors */
.evt-viewing{background:rgba(59,130,246,.12);color:var(--blue);border-left:3px solid var(--blue);}
.evt-maintenance{background:rgba(217,119,6,.12);color:var(--amber);border-left:3px solid var(--amber);}
.evt-rent{background:rgba(16,185,129,.12);color:var(--green);border-left:3px solid var(--green);}
.evt-meeting{background:rgba(124,58,237,.12);color:var(--purple);border-left:3px solid var(--purple);}
.evt-legal{background:rgba(225,29,72,.12);color:var(--red);border-left:3px solid var(--red);}
.evt-reminder{background:rgba(107,112,128,.1);color:var(--text-muted);border-left:3px solid var(--text-dim);}
.evt-inspection{background:rgba(13,148,136,.12);color:var(--teal);border-left:3px solid var(--teal);}

/* Sidebar */
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.sidebar-title{font-family:'DM Serif Display',serif;font-size:16px;}
.upcoming-list{max-height:500px;overflow-y:auto;}
.upcoming-date{padding:8px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;}
.upcoming-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;gap:10px;align-items:flex-start;}
.upcoming-item:hover{background:rgba(249,115,22,.03);}
.upcoming-item:last-child{border-bottom:none;}
.upcoming-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.upcoming-info{flex:1;min-width:0;}
.upcoming-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.upcoming-meta{font-size:11px;color:var(--text-dim);margin-top:2px;display:flex;gap:8px;align-items:center;}
.upcoming-empty{padding:30px 16px;text-align:center;color:var(--text-dim);font-size:13px;}

/* Day detail panel */
.day-detail{padding:16px;}
.day-detail-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:12px;}
.day-event-card{padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;gap:10px;align-items:flex-start;}
.day-event-card:hover{transform:translateX(2px);}
.day-event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.day-event-info{flex:1;min-width:0;}
.day-event-name{font-size:13px;font-weight:600;}
.day-event-time{font-size:11px;color:var(--text-dim);margin-top:1px;}
.day-event-prop{font-size:11px;color:var(--text-muted);margin-top:1px;}
.day-event-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.day-event-card:hover .day-event-actions{opacity:1;}
.day-event-actions button{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:14px;padding:2px;transition:color .12s;}
.day-event-actions button:hover{color:var(--accent);}
.day-event-actions .delete-btn:hover{color:var(--red);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;animation:fadeIn .15s ease;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-dim);padding:4px;transition:color .12s;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);transition:all .15s;outline:none;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,.08);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-textarea{resize:vertical;min-height:70px;}
.type-chips{display:flex;flex-wrap:wrap;gap:6px;}
.type-chip{padding:5px 12px;border-radius:20px;border:2px solid transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.type-chip:hover{opacity:.8;}
.type-chip.selected{border-color:currentColor;font-weight:600;}
.type-chip[data-type="viewing"]{background:rgba(59,130,246,.1);color:var(--blue);}
.type-chip[data-type="maintenance"]{background:rgba(217,119,6,.1);color:var(--amber);}
.type-chip[data-type="rent"]{background:rgba(16,185,129,.1);color:var(--green);}
.type-chip[data-type="meeting"]{background:rgba(124,58,237,.1);color:var(--purple);}
.type-chip[data-type="legal"]{background:rgba(225,29,72,.1);color:var(--red);}
.type-chip[data-type="reminder"]{background:rgba(107,112,128,.08);color:var(--text-muted);}
.type-chip[data-type="inspection"]{background:rgba(13,148,136,.1);color:var(--teal);}
.prop-chips{display:flex;flex-wrap:wrap;gap:6px;}
.prop-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.prop-chip:hover{border-color:var(--accent);color:var(--accent);}
.prop-chip.selected{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:500;}
.recurring-row{display:flex;align-items:center;gap:12px;}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:background .2s;}
.toggle input:checked+.toggle-track{background:var(--accent);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle input:checked~.toggle-thumb{transform:translateX(18px);}
.recurring-options{display:flex;gap:6px;margin-top:8px;}
.recurring-opt{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-family:'DM Sans',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.recurring-opt.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border);}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;z-index:999;animation:fadeUp .25s ease;box-shadow:var(--shadow-lg);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* Responsive */
@media(max-width:1024px){
  .page{flex-direction:column;}
  .sidebar-panel{width:100%;min-width:0;}
}
@media(max-width:600px){
  .page{padding:14px;}
  .cal-cell{min-height:60px;padding:3px;}
  .day-event{font-size:9px;padding:1px 4px;}
  .month-title{font-size:18px;min-width:auto;}
  .toolbar{gap:8px;}
  .filter-bar{gap:4px;}
  .filter-chip{font-size:11px;padding:4px 8px;}
  .search-box{width:120px;}
  header{padding:10px 14px;flex-wrap:wrap;gap:8px;}
}
@media print{header,.filter-bar,.toolbar .btn,.sidebar-panel{display:none!important;}.page{padding:0;max-width:100%;display:block;}.calendar-card{box-shadow:none;border:1px solid #ddd;}}
</style>
</head>
<body>
<script src="/gate.js"></script>
<header>
  <div class="brand">
    <div class="brand-mark">66</div>
    <div><div class="brand-name">Double Six Lets</div><div class="brand-sub">Calendar</div></div>
  </div>
  <nav class="nav-links">
    <a href="/" class="nav-link">Inbox</a>
    <a href="/financials" class="nav-link">Financials</a>
    <a href="/calendar" class="nav-link active">Calendar</a>
  </nav>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="exportICS()">Export .ics</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Event</button>
  </div>
</header>

<div class="page">
  <div class="calendar-main">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="nav-arrows">
          <button class="btn-icon" onclick="prevPeriod()" title="Previous">&lsaquo;</button>
          <button class="btn-icon" onclick="nextPeriod()" title="Next">&rsaquo;</button>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="goToday()">Today</button>
        <div class="month-title" id="monthTitle"></div>
      </div>
      <div class="toolbar-right">
        <input type="text" class="search-box" id="searchBox" placeholder="Search events..." oninput="renderAll()">
        <div class="view-toggle">
          <button class="view-btn active" data-view="month" onclick="setView('month')">Month</button>
          <button class="view-btn" data-view="week" onclick="setView('week')">Week</button>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar" id="filterBar">
      <div class="filter-chip active" data-filter="all" onclick="toggleFilter(this)"><span class="dot" style="background:var(--accent)"></span>All</div>
      <div class="filter-chip" data-filter="viewing" onclick="toggleFilter(this)"><span class="dot" style="background:var(--blue)"></span>Viewing</div>
      <div class="filter-chip" data-filter="maintenance" onclick="toggleFilter(this)"><span class="dot" style="background:var(--amber)"></span>Maintenance</div>
      <div class="filter-chip" data-filter="rent" onclick="toggleFilter(this)"><span class="dot" style="background:var(--green)"></span>Rent Due</div>
      <div class="filter-chip" data-filter="meeting" onclick="toggleFilter(this)"><span class="dot" style="background:var(--purple)"></span>Meeting</div>
      <div class="filter-chip" data-filter="legal" onclick="toggleFilter(this)"><span class="dot" style="background:var(--red)"></span>Legal</div>
      <div class="filter-chip" data-filter="reminder" onclick="toggleFilter(this)"><span class="dot" style="background:var(--text-dim)"></span>Reminder</div>
      <div class="filter-chip" data-filter="inspection" onclick="toggleFilter(this)"><span class="dot" style="background:var(--teal)"></span>Inspection</div>
      <span style="width:1px;height:20px;background:var(--border);margin:0 4px;"></span>
      <select class="form-input" style="width:auto;padding:5px 10px;font-size:12px;border-radius:20px;" id="propFilter" onchange="renderAll()">
        <option value="all">All Properties</option>
        <option value="39 Esher Road">39 Esher Road</option>
        <option value="49 Greene Way">49 Greene Way</option>
        <option value="105 Ladywell">105 Ladywell</option>
        <option value="General">General</option>
      </select>
    </div>

    <!-- Calendar views -->
    <div id="monthView"></div>
    <div id="weekView" style="display:none;"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar-panel">
    <!-- Day detail -->
    <div class="sidebar-card" id="dayDetailCard" style="display:none;">
      <div class="sidebar-header">
        <div class="sidebar-title" id="dayDetailTitle"></div>
        <button class="btn btn-sm btn-primary" onclick="openAddModalForDate(selectedDate)">+ Add</button>
      </div>
      <div id="dayDetailList"></div>
    </div>

    <!-- Upcoming -->
    <div class="sidebar-card">
      <div class="sidebar-header">
        <div class="sidebar-title">Upcoming Events</div>
        <button class="btn btn-sm btn-ghost" onclick="openAddModal()">+ Quick Add</button>
      </div>
      <div class="upcoming-list" id="upcomingList"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Event</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="evtTitle" placeholder="Event title...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="evtDate">
        </div>
        <div class="form-group">
          <label class="form-label">End Date (optional)</label>
          <input type="date" class="form-input" id="evtEndDate">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Time (optional)</label>
          <input type="time" class="form-input" id="evtStartTime">
        </div>
        <div class="form-group">
          <label class="form-label">End Time (optional)</label>
          <input type="time" class="form-input" id="evtEndTime">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Event Type</label>
        <div class="type-chips" id="typeChips">
          <div class="type-chip" data-type="viewing" onclick="selectType(this)">Viewing</div>
          <div class="type-chip" data-type="maintenance" onclick="selectType(this)">Maintenance</div>
          <div class="type-chip" data-type="rent" onclick="selectType(this)">Rent Due</div>
          <div class="type-chip" data-type="meeting" onclick="selectType(this)">Meeting</div>
          <div class="type-chip" data-type="legal" onclick="selectType(this)">Legal</div>
          <div class="type-chip" data-type="reminder" onclick="selectType(this)">Reminder</div>
          <div class="type-chip" data-type="inspection" onclick="selectType(this)">Inspection</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Property</label>
        <div class="prop-chips" id="propChips">
          <div class="prop-chip" data-prop="39 Esher Road" onclick="selectProp(this)">39 Esher Road</div>
          <div class="prop-chip" data-prop="49 Greene Way" onclick="selectProp(this)">49 Greene Way</div>
          <div class="prop-chip" data-prop="105 Ladywell" onclick="selectProp(this)">105 Ladywell</div>
          <div class="prop-chip" data-prop="General" onclick="selectProp(this)">General</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-input form-textarea" id="evtNotes" placeholder="Optional notes..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Recurring</label>
        <div class="recurring-row">
          <label class="toggle">
            <input type="checkbox" id="evtRecurring" onchange="document.getElementById('recurOpts').style.display=this.checked?'flex':'none'">
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
          <span style="font-size:13px;color:var(--text-muted);">Repeat this event</span>
        </div>
        <div class="recurring-options" id="recurOpts" style="display:none;">
          <div class="recurring-opt" data-freq="weekly" onclick="selectRecur(this)">Weekly</div>
          <div class="recurring-opt" data-freq="monthly" onclick="selectRecur(this)">Monthly</div>
          <div class="recurring-opt" data-freq="yearly" onclick="selectRecur(this)">Yearly</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const STORAGE_KEY = 'dsl_calendar_events';
const PROPERTIES = ['39 Esher Road','49 Greene Way','105 Ladywell','General'];
const EVENT_TYPES = {
  viewing:     { label:'Viewing',     color:'var(--blue)',     cls:'evt-viewing' },
  maintenance: { label:'Maintenance', color:'var(--amber)',    cls:'evt-maintenance' },
  rent:        { label:'Rent Due',    color:'var(--green)',    cls:'evt-rent' },
  meeting:     { label:'Meeting',     color:'var(--purple)',   cls:'evt-meeting' },
  legal:       { label:'Legal',       color:'var(--red)',      cls:'evt-legal' },
  reminder:    { label:'Reminder',    color:'var(--text-dim)', cls:'evt-reminder' },
  inspection:  { label:'Inspection',  color:'var(--teal)',     cls:'evt-inspection' },
};
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentView = 'month';
let currentYear, currentMonth, currentWeekStart;
let selectedDate = null;
let editingId = null;
let activeTypeFilter = 'all';
let selectedType = '';
let selectedProp = '';
let selectedRecur = '';

// ── Init ──
function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  currentWeekStart = getWeekStart(now);
  seedDefaultEvents();
  renderAll();
}

function getWeekStart(d) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() - dt.getDay() + 1); // Monday
  dt.setHours(0,0,0,0);
  return dt;
}

// ── Storage ──
function loadEvents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveEvents(evts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(evts));
}

// ── Seed default key dates ──
function seedDefaultEvents() {
  const evts = loadEvents();
  if (evts.length > 0) return;
  const now = new Date();
  const year = now.getFullYear();
  const defaults = [];

  // Monthly rent due dates for the next 12 months
  for (let m = 0; m < 12; m++) {
    const d = new Date(year, now.getMonth() + m, 1);
    PROPERTIES.filter(p => p !== 'General').forEach(prop => {
      defaults.push({
        id: crypto.randomUUID(),
        title: `Rent Due - ${prop}`,
        date: fmt(d),
        startTime: '',
        endTime: '',
        type: 'rent',
        property: prop,
        notes: 'Monthly rent collection',
        recurring: 'monthly',
        createdAt: new Date().toISOString()
      });
    });
  }

  // Quarterly inspections
  [0,3,6,9].forEach(q => {
    const d = new Date(year, q, 15);
    if (d >= now || (d.getMonth() >= now.getMonth())) {
      PROPERTIES.filter(p => p !== 'General').forEach(prop => {
        defaults.push({
          id: crypto.randomUUID(),
          title: `Quarterly Inspection - ${prop}`,
          date: fmt(d),
          startTime: '10:00',
          endTime: '11:00',
          type: 'inspection',
          property: prop,
          notes: 'Quarterly property inspection',
          recurring: 'yearly',
          createdAt: new Date().toISOString()
        });
      });
    }
  });

  // Annual gas safety checks
  PROPERTIES.filter(p => p !== 'General').forEach(prop => {
    defaults.push({
      id: crypto.randomUUID(),
      title: `Gas Safety Check - ${prop}`,
      date: fmt(new Date(year, 5, 1)),
      startTime: '09:00',
      endTime: '12:00',
      type: 'maintenance',
      property: prop,
      notes: 'Annual gas safety certificate renewal',
      recurring: 'yearly',
      createdAt: new Date().toISOString()
    });
  });

  // Tax deadlines
  defaults.push({
    id: crypto.randomUUID(),
    title: 'Self Assessment Tax Return Deadline',
    date: `${year + 1}-01-31`,
    startTime: '',
    endTime: '',
    type: 'reminder',
    property: 'General',
    notes: 'HMRC self assessment tax return due',
    recurring: 'yearly',
    createdAt: new Date().toISOString()
  });
  defaults.push({
    id: crypto.randomUUID(),
    title: 'Payment on Account (2nd)',
    date: `${year}-07-31`,
    startTime: '',
    endTime: '',
    type: 'reminder',
    property: 'General',
    notes: 'Second payment on account to HMRC',
    recurring: 'yearly',
    createdAt: new Date().toISOString()
  });
  defaults.push({
    id: crypto.randomUUID(),
    title: 'Payment on Account (1st)',
    date: `${year + 1}-01-31`,
    startTime: '',
    endTime: '',
    type: 'reminder',
    property: 'General',
    notes: 'First payment on account to HMRC',
    recurring: 'yearly',
    createdAt: new Date().toISOString()
  });

  saveEvents(defaults);
}

// ── Helpers ──
function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function isToday(dateStr) {
  return dateStr === fmt(new Date());
}
function formatDateNice(dateStr) {
  const d = parseDate(dateStr);
  return DAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
}
function formatDateShort(dateStr) {
  const d = parseDate(dateStr);
  return d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0,3);
}
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function getFilteredEvents() {
  let evts = loadEvents();
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const propF = document.getElementById('propFilter').value;
  if (activeTypeFilter !== 'all') evts = evts.filter(e => e.type === activeTypeFilter);
  if (propF !== 'all') evts = evts.filter(e => e.property === propF);
  if (search) evts = evts.filter(e => (e.title + ' ' + (e.notes||'')).toLowerCase().includes(search));
  return evts;
}
function eventsOnDate(dateStr) {
  return getFilteredEvents().filter(e => e.date === dateStr);
}
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ── Render ──
function renderAll() {
  if (currentView === 'month') renderMonth();
  else renderWeek();
  renderUpcoming();
  if (selectedDate) renderDayDetail(selectedDate);
  updateTitle();
}

function updateTitle() {
  const el = document.getElementById('monthTitle');
  if (currentView === 'month') {
    el.textContent = MONTHS[currentMonth] + ' ' + currentYear;
  } else {
    const end = new Date(currentWeekStart);
    end.setDate(end.getDate() + 6);
    if (currentWeekStart.getMonth() === end.getMonth()) {
      el.textContent = currentWeekStart.getDate() + ' \u2013 ' + end.getDate() + ' ' + MONTHS[end.getMonth()] + ' ' + end.getFullYear();
    } else {
      el.textContent = currentWeekStart.getDate() + ' ' + MONTHS[currentWeekStart.getMonth()].slice(0,3) + ' \u2013 ' + end.getDate() + ' ' + MONTHS[end.getMonth()].slice(0,3) + ' ' + end.getFullYear();
    }
  }
}

function renderMonth() {
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const days = daysInMonth(currentYear, currentMonth);
  const prevDays = daysInMonth(currentYear, currentMonth - 1);
  const startOffset = firstDay === 0 ? 6 : firstDay - 1; // Monday start
  const totalCells = Math.ceil((startOffset + days) / 7) * 7;

  let html = '<div class="calendar-card"><div class="cal-header">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    html += `<div class="cal-header-cell">${d}</div>`;
  });
  html += '</div><div class="cal-body">';

  for (let i = 0; i < totalCells; i++) {
    let dayNum, dateStr, cls = 'cal-cell';
    if (i < startOffset) {
      dayNum = prevDays - startOffset + i + 1;
      const m = currentMonth === 0 ? 11 : currentMonth - 1;
      const y = currentMonth === 0 ? currentYear - 1 : currentYear;
      dateStr = fmt(new Date(y, m, dayNum));
      cls += ' other-month';
    } else if (i >= startOffset + days) {
      dayNum = i - startOffset - days + 1;
      const m = currentMonth === 11 ? 0 : currentMonth + 1;
      const y = currentMonth === 11 ? currentYear + 1 : currentYear;
      dateStr = fmt(new Date(y, m, dayNum));
      cls += ' other-month';
    } else {
      dayNum = i - startOffset + 1;
      dateStr = fmt(new Date(currentYear, currentMonth, dayNum));
    }
    if (isToday(dateStr)) cls += ' today';
    if (selectedDate === dateStr) cls += ' selected';

    const dayEvts = eventsOnDate(dateStr);
    const maxShow = 3;
    let evtHtml = '';
    dayEvts.slice(0, maxShow).forEach(e => {
      const t = EVENT_TYPES[e.type] || EVENT_TYPES.reminder;
      evtHtml += `<div class="day-event ${t.cls}" onclick="event.stopPropagation();editEvent('${e.id}')" title="${e.title}">${e.startTime ? e.startTime + ' ' : ''}${e.title}</div>`;
    });
    if (dayEvts.length > maxShow) {
      evtHtml += `<div class="day-more">+${dayEvts.length - maxShow} more</div>`;
    }

    html += `<div class="${cls}" data-date="${dateStr}" onclick="selectDay('${dateStr}')"><div class="day-num">${dayNum}</div><div class="day-events">${evtHtml}</div></div>`;
  }
  html += '</div></div>';
  document.getElementById('monthView').innerHTML = html;
}

function renderWeek() {
  let html = '<div class="week-grid"><div class="week-header"><div class="week-header-cell"></div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate() + i);
    const dateStr = fmt(d);
    const todayCls = isToday(dateStr) ? ' today-col' : '';
    html += `<div class="week-header-cell${todayCls}">${DAYS[d.getDay()]}<span class="week-day-num">${d.getDate()}</span></div>`;
  }
  html += '</div><div class="week-body">';

  for (let h = 6; h < 22; h++) {
    const timeLabel = String(h).padStart(2,'0') + ':00';
    html += `<div class="week-time">${timeLabel}</div>`;
    for (let i = 0; i < 7; i++) {
      const d = new Date(currentWeekStart);
      d.setDate(d.getDate() + i);
      const dateStr = fmt(d);
      html += `<div class="week-slot" data-date="${dateStr}" data-hour="${h}" onclick="selectDay('${dateStr}');openAddModalForDateTime('${dateStr}','${timeLabel}')">`;

      // Render events for this hour
      const dayEvts = eventsOnDate(dateStr);
      dayEvts.forEach(e => {
        if (!e.startTime) return;
        const [eh] = e.startTime.split(':').map(Number);
        if (eh === h) {
          const t = EVENT_TYPES[e.type] || EVENT_TYPES.reminder;
          let heightSlots = 1;
          if (e.endTime) {
            const [eh2, em2] = e.endTime.split(':').map(Number);
            heightSlots = Math.max(1, (eh2 * 60 + em2 - eh * 60) / 60);
          }
          html += `<div class="week-event ${t.cls}" style="height:${heightSlots * 48 - 4}px;" onclick="event.stopPropagation();editEvent('${e.id}')" title="${e.title}">${e.startTime} ${e.title}</div>`;
        }
      });
      html += '</div>';
    }
  }
  html += '</div></div>';
  document.getElementById('weekView').innerHTML = html;
}

function renderUpcoming() {
  const today = fmt(new Date());
  const future = new Date();
  future.setDate(future.getDate() + 30);
  const futureStr = fmt(future);

  let evts = getFilteredEvents().filter(e => e.date >= today && e.date <= futureStr);
  evts.sort((a, b) => a.date.localeCompare(b.date) || (a.startTime||'').localeCompare(b.startTime||''));

  const container = document.getElementById('upcomingList');
  if (evts.length === 0) {
    container.innerHTML = '<div class="upcoming-empty">No upcoming events in the next 30 days</div>';
    return;
  }

  let html = '';
  let lastDate = '';
  evts.forEach(e => {
    if (e.date !== lastDate) {
      const label = isToday(e.date) ? 'Today' : formatDateNice(e.date);
      html += `<div class="upcoming-date">${label}</div>`;
      lastDate = e.date;
    }
    const t = EVENT_TYPES[e.type] || EVENT_TYPES.reminder;
    html += `<div class="upcoming-item" onclick="editEvent('${e.id}')">
      <div class="upcoming-dot" style="background:${t.color}"></div>
      <div class="upcoming-info">
        <div class="upcoming-title">${e.title}</div>
        <div class="upcoming-meta">
          ${e.startTime ? '<span>' + e.startTime + (e.endTime ? ' \u2013 ' + e.endTime : '') + '</span>' : ''}
          <span>${e.property}</span>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function renderDayDetail(dateStr) {
  const card = document.getElementById('dayDetailCard');
  card.style.display = '';
  document.getElementById('dayDetailTitle').textContent = formatDateNice(dateStr);

  const evts = eventsOnDate(dateStr);
  const list = document.getElementById('dayDetailList');
  if (evts.length === 0) {
    list.innerHTML = '<div class="day-detail"><div style="text-align:center;color:var(--text-dim);padding:20px;font-size:13px;">No events this day</div></div>';
    return;
  }

  let html = '<div class="day-detail">';
  evts.forEach(e => {
    const t = EVENT_TYPES[e.type] || EVENT_TYPES.reminder;
    html += `<div class="day-event-card" onclick="editEvent('${e.id}')">
      <div class="day-event-dot" style="background:${t.color}"></div>
      <div class="day-event-info">
        <div class="day-event-name">${e.title}</div>
        ${e.startTime ? `<div class="day-event-time">${e.startTime}${e.endTime ? ' \u2013 ' + e.endTime : ''}</div>` : ''}
        <div class="day-event-prop">${e.property} &middot; ${t.label}${e.recurring ? ' &middot; Recurring ' + e.recurring : ''}</div>
      </div>
      <div class="day-event-actions">
        <button onclick="event.stopPropagation();editEvent('${e.id}')" title="Edit">&#9998;</button>
        <button class="delete-btn" onclick="event.stopPropagation();deleteEvent('${e.id}')" title="Delete">&#128465;</button>
      </div>
    </div>`;
  });
  html += '</div>';
  list.innerHTML = html;
}

// ── Navigation ──
function prevPeriod() {
  if (currentView === 'month') {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  } else {
    currentWeekStart.setDate(currentWeekStart.getDate() - 7);
  }
  renderAll();
}
function nextPeriod() {
  if (currentView === 'month') {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  } else {
    currentWeekStart.setDate(currentWeekStart.getDate() + 7);
  }
  renderAll();
}
function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  currentWeekStart = getWeekStart(now);
  selectedDate = fmt(now);
  renderAll();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.getElementById('monthView').style.display = v === 'month' ? '' : 'none';
  document.getElementById('weekView').style.display = v === 'week' ? '' : 'none';
  renderAll();
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  renderAll();
}

// ── Filters ──
function toggleFilter(chip) {
  const f = chip.dataset.filter;
  activeTypeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderAll();
}

// ── Modal ──
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Event';
  document.getElementById('evtTitle').value = '';
  document.getElementById('evtDate').value = selectedDate || fmt(new Date());
  document.getElementById('evtEndDate').value = '';
  document.getElementById('evtStartTime').value = '';
  document.getElementById('evtEndTime').value = '';
  document.getElementById('evtNotes').value = '';
  document.getElementById('evtRecurring').checked = false;
  document.getElementById('recurOpts').style.display = 'none';
  clearChips();
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('evtTitle').focus(), 100);
}

function openAddModalForDate(dateStr) {
  openAddModal();
  document.getElementById('evtDate').value = dateStr;
}

function openAddModalForDateTime(dateStr, time) {
  openAddModal();
  document.getElementById('evtDate').value = dateStr;
  document.getElementById('evtStartTime').value = time;
  const [h] = time.split(':').map(Number);
  document.getElementById('evtEndTime').value = String(h+1).padStart(2,'0') + ':00';
}

function editEvent(id) {
  const evts = loadEvents();
  const e = evts.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('evtTitle').value = e.title;
  document.getElementById('evtDate').value = e.date;
  document.getElementById('evtEndDate').value = e.endDate || '';
  document.getElementById('evtStartTime').value = e.startTime || '';
  document.getElementById('evtEndTime').value = e.endTime || '';
  document.getElementById('evtNotes').value = e.notes || '';
  document.getElementById('evtRecurring').checked = !!e.recurring;
  document.getElementById('recurOpts').style.display = e.recurring ? 'flex' : 'none';

  clearChips();
  if (e.type) {
    selectedType = e.type;
    const tc = document.querySelector(`.type-chip[data-type="${e.type}"]`);
    if (tc) tc.classList.add('selected');
  }
  if (e.property) {
    selectedProp = e.property;
    const pc = document.querySelector(`.prop-chip[data-prop="${e.property}"]`);
    if (pc) pc.classList.add('selected');
  }
  if (e.recurring) {
    selectedRecur = e.recurring;
    const rc = document.querySelector(`.recurring-opt[data-freq="${e.recurring}"]`);
    if (rc) rc.classList.add('selected');
  }

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}

function clearChips() {
  selectedType = '';
  selectedProp = '';
  selectedRecur = '';
  document.querySelectorAll('.type-chip,.prop-chip,.recurring-opt').forEach(c => c.classList.remove('selected'));
}

function selectType(el) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
}

function selectProp(el) {
  document.querySelectorAll('.prop-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedProp = el.dataset.prop;
}

function selectRecur(el) {
  document.querySelectorAll('.recurring-opt').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedRecur = el.dataset.freq;
}

function saveEvent() {
  const title = document.getElementById('evtTitle').value.trim();
  const date = document.getElementById('evtDate').value;
  if (!title || !date) { showToast('Title and date are required'); return; }
  if (!selectedType) { showToast('Please select an event type'); return; }
  if (!selectedProp) { showToast('Please select a property'); return; }

  const evt = {
    id: editingId || crypto.randomUUID(),
    title,
    date,
    endDate: document.getElementById('evtEndDate').value || '',
    startTime: document.getElementById('evtStartTime').value || '',
    endTime: document.getElementById('evtEndTime').value || '',
    type: selectedType,
    property: selectedProp,
    notes: document.getElementById('evtNotes').value.trim(),
    recurring: document.getElementById('evtRecurring').checked ? (selectedRecur || 'monthly') : '',
    createdAt: editingId ? undefined : new Date().toISOString()
  };

  let evts = loadEvents();
  if (editingId) {
    const idx = evts.findIndex(e => e.id === editingId);
    if (idx >= 0) { evt.createdAt = evts[idx].createdAt; evts[idx] = evt; }
  } else {
    evts.push(evt);
  }
  saveEvents(evts);
  closeModal();
  selectedDate = date;
  renderAll();
  showToast(editingId ? 'Event updated' : 'Event added');
}

function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  let evts = loadEvents();
  evts = evts.filter(e => e.id !== id);
  saveEvents(evts);
  renderAll();
  showToast('Event deleted');
}

// ── Export ICS ──
function exportICS() {
  const evts = loadEvents();
  if (evts.length === 0) { showToast('No events to export'); return; }

  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Double Six Lets//Calendar//EN\r\nCALSCALE:GREGORIAN\r\n';

  evts.forEach(e => {
    const d = e.date.replace(/-/g, '');
    let dtStart = d;
    let dtEnd = d;
    if (e.startTime) {
      dtStart = d + 'T' + e.startTime.replace(':', '') + '00';
      if (e.endTime) {
        dtEnd = d + 'T' + e.endTime.replace(':', '') + '00';
      } else {
        dtEnd = d + 'T' + e.startTime.replace(':', '') + '00';
      }
    }
    ics += 'BEGIN:VEVENT\r\n';
    ics += `UID:${e.id}@doublesixlets.com\r\n`;
    if (e.startTime) {
      ics += `DTSTART:${dtStart}\r\nDTEND:${dtEnd}\r\n`;
    } else {
      ics += `DTSTART;VALUE=DATE:${dtStart}\r\nDTEND;VALUE=DATE:${dtEnd}\r\n`;
    }
    ics += `SUMMARY:${e.title}\r\n`;
    if (e.notes) ics += `DESCRIPTION:${e.notes.replace(/\n/g, '\\n')}\r\n`;
    ics += `CATEGORIES:${(EVENT_TYPES[e.type]||{}).label||e.type}\r\n`;
    ics += `LOCATION:${e.property}\r\n`;
    if (e.recurring) {
      const freqMap = { weekly:'WEEKLY', monthly:'MONTHLY', yearly:'YEARLY' };
      ics += `RRULE:FREQ=${freqMap[e.recurring]||'MONTHLY'}\r\n`;
    }
    ics += 'END:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR\r\n';

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'double-six-lets-calendar.ics';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Calendar exported');
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  // Don't intercept if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    if (e.key === 'Escape') { closeModal(); e.target.blur(); }
    return;
  }

  if (e.key === 'Escape') { closeModal(); return; }
  if (e.key === 'Enter' && !document.getElementById('modalOverlay').classList.contains('show')) {
    openAddModal();
    return;
  }

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (selectedDate) {
      const d = parseDate(selectedDate);
      d.setDate(d.getDate() - 1);
      selectedDate = fmt(d);
      // Navigate month/week if needed
      if (currentView === 'month' && d.getMonth() !== currentMonth) {
        currentMonth = d.getMonth();
        currentYear = d.getFullYear();
      }
      renderAll();
    } else { prevPeriod(); }
    return;
  }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (selectedDate) {
      const d = parseDate(selectedDate);
      d.setDate(d.getDate() + 1);
      selectedDate = fmt(d);
      if (currentView === 'month' && d.getMonth() !== currentMonth) {
        currentMonth = d.getMonth();
        currentYear = d.getFullYear();
      }
      renderAll();
    } else { nextPeriod(); }
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (selectedDate) {
      const d = parseDate(selectedDate);
      d.setDate(d.getDate() - 7);
      selectedDate = fmt(d);
      if (currentView === 'month' && d.getMonth() !== currentMonth) {
        currentMonth = d.getMonth();
        currentYear = d.getFullYear();
      }
      renderAll();
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (selectedDate) {
      const d = parseDate(selectedDate);
      d.setDate(d.getDate() + 7);
      selectedDate = fmt(d);
      if (currentView === 'month' && d.getMonth() !== currentMonth) {
        currentMonth = d.getMonth();
        currentYear = d.getFullYear();
      }
      renderAll();
    }
    return;
  }
  if (e.key === 't' || e.key === 'T') { goToday(); return; }
  if (e.key === 'm' || e.key === 'M') { setView('month'); return; }
  if (e.key === 'w' || e.key === 'W') { setView('week'); return; }
});

// ── Init on load ──
init();
</script>
